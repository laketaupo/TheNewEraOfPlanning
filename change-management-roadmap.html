<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Change Management Roadmap</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f8fafc;
      color: #1e293b;
      min-height: 100vh;
    }

    /* ── Page header ── */
    .page-header {
      background: white;
      border-bottom: 1px solid #e2e8f0;
      padding: 24px 32px 20px;
    }
    .page-header h1 {
      font-size: 22px;
      font-weight: 700;
      color: #0f172a;
      letter-spacing: -0.01em;
    }
    .page-header p {
      margin-top: 4px;
      font-size: 13px;
      color: #64748b;
    }
    .header-meta {
      display: flex;
      align-items: center;
      gap: 20px;
      margin-top: 14px;
      flex-wrap: wrap;
    }
    .legend-item {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      color: #475569;
    }
    .legend-dot {
      width: 10px;
      height: 10px;
      border-radius: 2px;
      flex-shrink: 0;
    }
    .legend-sep { width: 1px; height: 16px; background: #e2e8f0; }
    .chip-legend {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .chip-legend-sample {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      border-radius: 4px;
      padding: 2px 7px 2px 5px;
      font-size: 10px;
      border: 1px solid #e2e8f0;
      background: white;
      color: #475569;
    }
    .chip-legend-sample::before { content: '◆'; font-size: 6px; color: #94a3b8; }
    .chip-legend-sample.toggleable {
      cursor: pointer;
      opacity: 0.38;
      transition: opacity 0.15s;
      user-select: none;
    }
    .chip-legend-sample.toggleable:hover  { opacity: 0.65; }
    .chip-legend-sample.toggleable.active { opacity: 1; }
    .chip-legend-sample.go-live { border-color: #bbf7d0; color: #166534; background: #f0fdf4; }
    .chip-legend-sample.go-live::before { color: #22c55e; }
    .chip-legend-sample.signoff { border-color: #e0e7ff; color: #3730a3; background: #eef2ff; }
    .chip-legend-sample.signoff::before { color: #6366f1; }

    /* ── Main layout ── */
    .main {
      display: flex;
      height: calc(100vh - 110px);
      overflow: hidden;
    }

    /* ── Grid panel ── */
    .grid-panel {
      flex: 1;
      overflow: auto;
      padding: 24px 24px 32px;
    }

    /* ── Swimlane grid ── */
    .swimlane {
      min-width: 700px;
      width: 100%;
      position: relative;
    }

    /* Phase header row */
    .phase-header-row {
      display: grid;
      grid-template-columns: 175px repeat(7, 1fr);
      gap: 3px;
      margin-bottom: 4px;
      position: sticky;
      top: 0;
      z-index: 10;
      background: #f8fafc;
      padding-bottom: 4px;
    }
    .phase-header-row .corner { /* empty top-left */ }
    .phase-cell {
      background: #6366f1;
      color: white;
      border-radius: 6px;
      padding: 8px 4px 6px;
      text-align: center;
      cursor: default;
    }
    .phase-cell .phase-num {
      font-size: 13px;
      font-weight: 700;
      display: block;
    }
    .phase-cell .phase-label {
      font-size: 9px;
      opacity: 0.85;
      display: block;
      margin-top: 2px;
      line-height: 1.3;
    }

    /* Group header */
    .group-header {
      grid-column: 1 / -1;
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 4px 4px;
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      color: #94a3b8;
    }
    .group-header-line {
      flex: 1;
      height: 1px;
      background: #e2e8f0;
    }

    /* Team row */
    .team-row {
      display: grid;
      grid-template-columns: 175px repeat(7, 1fr);
      gap: 0;
      border-bottom: 1px solid #e8ecf0;
    }
    .team-row:last-child { border-bottom: none; }
    .team-name {
      display: flex;
      align-items: center;
      padding: 0 10px 0 4px;
      font-size: 12px;
      color: #334155;
      font-weight: 500;
      line-height: 1.3;
      box-sizing: border-box;
    }

    /* Activity cells */
    .cell {
      position: relative;
      box-sizing: border-box;
      border-right: 1px solid #e8ecf0;
    }
    .cell:last-child { border-right: none; }
    .cell.empty {
      background: transparent;
    }
    .cell.primary {
      cursor: pointer;
      display: flex;
      flex-direction: column;
      gap: 2px;
      padding: 4px 6px;
      background: transparent;
    }
    .cell.primary:hover {
      background: #f8fafc;
    }
    .cell.selected {
      outline: 2.5px solid #0f172a;
      outline-offset: 1px;
      z-index: 4;
    }

    /* User steps row */
    .user-steps-section {
      margin-top: 10px;
      border-top: 2px solid #e2e8f0;
      padding-top: 8px;
    }
    .user-steps-label {
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      color: #94a3b8;
      margin-bottom: 6px;
      padding-left: 4px;
    }
    .user-steps-row {
      display: grid;
      grid-template-columns: 175px repeat(7, 1fr);
      gap: 3px;
    }
    .user-step-label { /* spacer */ }
    .user-step {
      background: white;
      border: 1.5px solid #cbd5e1;
      border-radius: 6px;
      padding: 6px 6px 5px;
      text-align: center;
    }
    .user-step .step-num {
      font-size: 9px;
      font-weight: 700;
      color: #6366f1;
      display: block;
    }
    .user-step .step-text {
      font-size: 9px;
      color: #475569;
      display: block;
      margin-top: 2px;
      line-height: 1.3;
    }

    /* ── Detail panel ── */
    .detail-panel {
      width: 320px;
      min-width: 320px;
      background: white;
      border-left: 1px solid #e2e8f0;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      transition: width 0.25s ease;
    }
    .detail-panel.hidden {
      width: 0;
      min-width: 0;
    }
    .detail-inner {
      padding: 24px 20px;
      overflow-y: auto;
      flex: 1;
    }
    .detail-empty {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      color: #94a3b8;
      font-size: 13px;
      text-align: center;
      gap: 8px;
      padding: 32px;
    }
    .detail-empty svg { opacity: 0.3; }

    .detail-tag {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      padding: 3px 8px;
      border-radius: 20px;
      color: white;
      margin-bottom: 12px;
    }
    .detail-team-name {
      font-size: 17px;
      font-weight: 700;
      color: #0f172a;
      margin-bottom: 4px;
      line-height: 1.3;
    }
    .detail-phase-name {
      font-size: 12px;
      color: #64748b;
      margin-bottom: 16px;
      padding-bottom: 16px;
      border-bottom: 1px solid #f1f5f9;
    }
    .detail-phase-name strong {
      color: #475569;
    }

    .detail-section { margin-bottom: 16px; }
    .detail-section-title {
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      color: #94a3b8;
      margin-bottom: 6px;
    }
    .detail-goal {
      font-size: 13px;
      color: #334155;
      line-height: 1.55;
      font-style: italic;
    }
    .detail-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 5px;
    }
    .detail-list li {
      font-size: 12px;
      color: #475569;
      line-height: 1.45;
      display: flex;
      gap: 7px;
      align-items: flex-start;
    }
    .detail-list li::before {
      content: '';
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: currentColor;
      flex-shrink: 0;
      margin-top: 5px;
      opacity: 0.5;
    }
    .deliverable-badge {
      display: inline-block;
      background: #f1f5f9;
      border: 1px solid #e2e8f0;
      border-radius: 4px;
      padding: 2px 7px;
      font-size: 11px;
      color: #475569;
      margin: 2px 3px 2px 0;
    }
    .detail-close {
      position: absolute;
      top: 12px;
      right: 12px;
      background: none;
      border: none;
      cursor: pointer;
      color: #94a3b8;
      font-size: 18px;
      line-height: 1;
      padding: 4px;
      border-radius: 4px;
    }
    .detail-close:hover { color: #475569; background: #f1f5f9; }
    .detail-header-wrap { position: relative; }

    .secondary-badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      font-size: 10px;
      color: #94a3b8;
      background: #f8fafc;
      border: 1px solid #e2e8f0;
      border-radius: 4px;
      padding: 2px 7px;
      margin-bottom: 12px;
    }

    /* ── Milestone chips ── */
    .milestone-chip {
      background: white;
      border: 1px solid #e2e8f0;
      border-radius: 4px;
      padding: 2px 7px 2px 5px;
      font-size: 9px;
      color: #475569;
      line-height: 1.4;
      display: flex;
      align-items: flex-start;
      gap: 4px;
      box-shadow: 0 1px 2px rgba(0,0,0,0.04);
    }
    .milestone-chip::before {
      content: '◆';
      font-size: 6px;
      color: #94a3b8;
      flex-shrink: 0;
      margin-top: 3px;
    }
    .milestone-chip.go-live { border-color: #bbf7d0; color: #166534; background: #f0fdf4; }
    .milestone-chip.go-live::before { color: #22c55e; }
    .milestone-chip.signoff { border-color: #e0e7ff; color: #3730a3; background: #eef2ff; }
    .milestone-chip.signoff::before { color: #6366f1; }

    /* Hidden by default — shown when filter is toggled on */
    .milestone-chip.go-live  { display: none; }
    .milestone-chip.signoff  { display: none; }
    body.show-golive  .milestone-chip.go-live  { display: flex; }
    body.show-signoff .milestone-chip.signoff  { display: flex; }

    /* Milestone list in detail panel */
    .milestone-list { list-style: none; display: flex; flex-direction: column; gap: 4px; }
    .milestone-list li {
      font-size: 12px; color: #334155;
      display: flex; align-items: flex-start; gap: 8px;
      padding: 5px 0;
      border-bottom: 1px solid #f8fafc;
    }
    .milestone-list li::before {
      content: '◆';
      font-size: 8px; color: #6366f1;
      flex-shrink: 0; margin-top: 3px;
    }

    /* ── Dep dot indicators ── */

    @media print {
      .detail-panel { display: none; }
      .main { height: auto; overflow: visible; }
      .grid-panel { overflow: visible; padding: 16px; }
      .phase-header-row { position: static; }
      body { background: white; }
    }
  </style>
</head>
<body>

<div class="page-header">
  <h1>Change Management Roadmap</h1>
  <p>15 teams · 7 organisatiefases · eindgebruiker adoptie journey</p>
  <div class="header-meta">

  </div>
</div>

<div class="main">

  </div>
  <div class="detail-panel hidden" id="detailPanel">

  </div>
</div>

function getTeamMeta(teamId) {
  for (const g of GROUPS) {
    for (const t of g.teams) {
      if (t.id === teamId) return { team: t, group: g };
    }
  }
  return null;
}

let selectedCell = null;

function buildGrid() {
  // Uniform row height: sized to fit the most milestone chips any team has in a single phase
  let globalMaxMs = 1;
  for (const teamMs of Object.values(MILESTONES)) {
    for (const phaseArr of Object.values(teamMs)) {
      if (phaseArr.length > globalMaxMs) globalMaxMs = phaseArr.length;
    }
  }
  const CHIP_H = 17, CHIP_GAP = 2, CELL_PAD = 8;
  const ROW_H = CELL_PAD + globalMaxMs * CHIP_H + Math.max(0, globalMaxMs - 1) * CHIP_GAP;

  const swimlane = document.getElementById('swimlane');

  // Phase header row
  const headerRow = document.createElement('div');
  headerRow.className = 'phase-header-row';
  headerRow.innerHTML = '<div class="corner"></div>';
  PHASES.forEach(p => {
    headerRow.innerHTML += `<div class="phase-cell"><span class="phase-num">${p.num}</span><span class="phase-label">${p.name}</span></div>`;
  });
  swimlane.appendChild(headerRow);

  // Groups & teams
  GROUPS.forEach(group => {
    const groupHeader = document.createElement('div');
    groupHeader.className = 'group-header';
    groupHeader.innerHTML = `<span>${group.label}</span><div class="group-header-line"></div>`;
    swimlane.appendChild(groupHeader);

    group.teams.forEach(team => {
      const row = document.createElement('div');
      row.className = 'team-row';

      const nameCell = document.createElement('div');
      nameCell.className = 'team-name';
      nameCell.textContent = team.name;
      nameCell.style.background = COLOR_MAP[team.color];
      nameCell.style.color = '#ffffff';
      nameCell.style.height = ROW_H + 'px';
      row.appendChild(nameCell);

      const teamMs = MILESTONES[team.id];

      for (let i = 1; i <= 7; i++) {
        const phaseData = team.phases[i];
        const cell = document.createElement('div');
        cell.style.height = ROW_H + 'px';
        if (!phaseData) {
          cell.className = 'cell empty';
        } else {
          cell.className = 'cell primary';
          cell.id = `cell-${team.id}-${i}`;
          cell.title = `${team.name} · F${i}`;

          // Milestone chips inline
          if (teamMs && teamMs[i]) {
            teamMs[i].forEach(m => {
              const chip = document.createElement('div');
              chip.className = 'milestone-chip' + (m.type ? ` ${m.type}` : '');
              chip.textContent = m.text;
              cell.appendChild(chip);
            });
          }

          cell.addEventListener('click', () => onCellClick(cell, team, group, i, phaseData));
        }
        row.appendChild(cell);
      }

      swimlane.appendChild(row);
    });
  });

  // User steps
  const stepsSection = document.createElement('div');
  stepsSection.className = 'user-steps-section';
  stepsSection.innerHTML = '<div class="user-steps-label">Eindgebruiker adoptie journey</div>';
  const stepsRow = document.createElement('div');
  stepsRow.className = 'user-steps-row';
  stepsRow.innerHTML = '<div class="user-step-label"></div>';
  USER_STEPS.forEach(s => {
    stepsRow.innerHTML += `<div class="user-step"><span class="step-num">${s.num}</span><span class="step-text">${s.text}</span></div>`;
  });
  stepsSection.appendChild(stepsRow);
  swimlane.appendChild(stepsSection);
}

function onCellClick(cellEl, team, group, phaseIndex, phaseData) {
  if (selectedCell) selectedCell.classList.remove('selected');
  selectedCell = cellEl;
  cellEl.classList.add('selected');

  const panel = document.getElementById('detailPanel');
  const inner = document.getElementById('detailInner');
  panel.classList.remove('hidden');

  const color = COLOR_MAP[team.color];
  const phase = PHASES[phaseIndex - 1];
  const isSecondary = phaseData.level === 'secondary';

  const deliverablesBadges = phaseData.deliverables
    .map(d => `<span class="deliverable-badge">${d}</span>`).join('');
  const activiteitenItems = phaseData.activiteiten
    .map(a => `<li>${a}</li>`).join('');

  // Milestones section
  const teamMs = MILESTONES[team.id];
  const phaseMs = teamMs && teamMs[phaseIndex];
  let milestonesHTML = '';
  if (phaseMs && phaseMs.length > 0) {
    const items = phaseMs.map(m => `<li>${m.text}</li>`).join('');
    milestonesHTML = `<div class="detail-section">
      <div class="detail-section-title">Mijlpalen</div>
      <ul class="milestone-list">${items}</ul>
    </div>`;
  }

  inner.innerHTML = `
    <div class="detail-header-wrap">
      <button class="detail-close" onclick="closePanel()">×</button>
      <div class="detail-tag" style="background:${color}">${group.label}</div>
      ${isSecondary ? '<div class="secondary-badge">Ondersteunende rol in deze fase</div>' : ''}
      <div class="detail-team-name">${team.name}</div>
      <div class="detail-phase-name"><strong>${phase.num} — ${phase.name}</strong></div>
    </div>
    <div class="detail-section">
      <div class="detail-section-title">Doel</div>
      <div class="detail-goal">${phaseData.doel}</div>
    </div>
    <div class="detail-section">
      <div class="detail-section-title">Kernactiviteiten</div>
      <ul class="detail-list">${activiteitenItems}</ul>
    </div>
    <div class="detail-section">
      <div class="detail-section-title">Deliverables</div>
      <div>${deliverablesBadges}</div>
    </div>
    ${milestonesHTML}
  `;
}

function closePanel() {
  document.getElementById('detailPanel').classList.add('hidden');
  if (selectedCell) {
    selectedCell.classList.remove('selected');
    selectedCell = null;
  }
}

function toggleFilter(type) {
  const cls = type === 'golive' ? 'show-golive' : 'show-signoff';
  const btn = document.getElementById('toggle-' + type);
  document.body.classList.toggle(cls);
  btn.classList.toggle('active', document.body.classList.contains(cls));
}
