name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # No npm ci / build step — css/site.css, data/*.json, and content/ are generated once by
      # `npm run generate` (see package.json) and committed by whoever authored the content
      # change, not regenerated per-deploy. This step only curates which committed, already-static
      # files get published — it copies, it doesn't compile.
      - name: Assemble static site
        run: |
          mkdir -p _site
          cp index.html 404.html favicon.svg .nojekyll _site/
          cp -r css js content data ui-training _site/

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
